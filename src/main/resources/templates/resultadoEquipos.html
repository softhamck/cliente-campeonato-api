<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultados - Cliente API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>📊 Resultados de la Búsqueda</h1>
        
        <div class="alert alert-info">
            <strong>Búsqueda:</strong> <span th:text="${tipoBusqueda}"></span><br/>
            <strong>Resultados encontrados:</strong> <span th:text="${totalResultados}"></span>
        </div>
        
        <div th:if="${#lists.isEmpty(equipos)}" class="alert alert-warning">
            ⚠️ No se encontraron equipos con ese criterio de búsqueda.
        </div>
        
        <table class="table table-striped table-bordered" th:unless="${#lists.isEmpty(equipos)}">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Ciudad</th>
                    <th>Director Técnico</th>
                    <th>Campeonato</th>
                    <th>Grupo</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="equipo : ${equipos}">
                    <td th:text="${equipo.id}">1</td>
                    <td th:text="${equipo.nombre}">Nombre</td>
                    <td th:text="${equipo.ciudad}">Ciudad</td>
                    <td th:text="${equipo.directorTecnico}">DT</td>
                    <td th:text="${equipo.nombreCampeonato}">Campeonato</td>
                    <td th:text="${equipo.nombreGrupo}">Grupo</td>
                </tr>
            </tbody>
        </table>
        
        <div class="mt-3">
            <a th:href="@{/cliente/buscar}" class="btn btn-primary">🔎 Nueva Búsqueda</a>
            <a th:href="@{/cliente/}" class="btn btn-secondary">🏠 Inicio Cliente</a>
        </div>
    </div>
</body>
</html>
