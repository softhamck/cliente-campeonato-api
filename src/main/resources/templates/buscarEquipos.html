<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buscar Equipos - Cliente API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>🔎 Buscar Equipos</h1>
        <p class="text-muted">Consume la API REST del sistema principal</p>
        
        <!-- BÚSQUEDA 1: Por Nombre -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">📝 Buscar por Nombre</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/cliente/buscarPorNombre}" method="post">
                    <div class="input-group">
                        <input type="text" name="nombre" class="form-control" 
                               placeholder="Ej: CD Nacional" required/>
                        <button type="submit" class="btn btn-primary">Buscar</button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- BÚSQUEDA 2: Por Ciudad -->
        <div class="card mb-4">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">🏙️ Buscar por Ciudad</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/cliente/buscarPorCiudad}" method="post">
                    <div class="input-group">
                        <input type="text" name="ciudad" class="form-control" 
                               placeholder="Ej: Medellín" required/>
                        <button type="submit" class="btn btn-success">Buscar</button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- BÚSQUEDA 3: Por Campeonato -->
        <div class="card mb-4">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0">🏆 Buscar por Campeonato</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/cliente/buscarPorCampeonato}" method="post">
                    <div class="input-group">
                        <input type="number" name="idCampeonato" class="form-control" 
                               placeholder="ID del campeonato (Ej: 1)" min="1" required/>
                        <button type="submit" class="btn btn-warning">Buscar</button>
                    </div>
                </form>
            </div>
        </div>
        
        <a th:href="@{/cliente/}" class="btn btn-secondary">⬅ Volver</a>
    </div>
</body>
</html>
